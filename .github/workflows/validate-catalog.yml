name: "Validate CATALOG.yaml"

# Validates the repo-root CATALOG.yaml against the spec-0045 schema on
# every PR and every push to main. The validator itself lives at
# tools/validate_catalog.py and is exercised by
# tools/tests/test_validate_catalog.py.
#
# Spec source: docs/specs/0045-coworld-role-repos.md in metta
# (§"CATALOG.yaml schema").

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest

      - name: Run validator against repo-root CATALOG.yaml
        run: python tools/validate_catalog.py

      - name: Run validator self-test
        run: python tools/validate_catalog.py --self-test

      - name: Run validator unit tests
        run: pytest tools/tests/ -v
